name: Merge

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    name: Merge PR
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      github.event.comment.user.login == github.repository_owner &&
      (contains(github.event.comment.body, '/lgtm') ||
       contains(github.event.comment.body, '/approve') ||
       contains(github.event.comment.body, '/shipit'))
    steps:
      - uses: actions/checkout@v4

      - name: Get PR head SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh pr view ${{ github.event.issue.number }} --json headRefOid -q .headRefOid)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Verify CI passed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(gh api "repos/${{ github.repository }}/commits/${{ steps.pr.outputs.sha }}/status" --jq '.state')
          if [ "$STATUS" != "success" ]; then
            FAILING=$(gh api "repos/${{ github.repository }}/commits/${{ steps.pr.outputs.sha }}/check-runs" \
              --jq '[.check_runs[] | select(.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral")] | length')
            if [ "$FAILING" -gt 0 ]; then
              gh pr comment ${{ github.event.issue.number }} --body "Cannot merge: CI has not passed. Check the status checks."
              exit 1
            fi
          fi

      - name: Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.issue.number }} --squash --delete-branch
