name: Smoke Test

on:
  push:
    branches: [main]
    paths:
      - "extensions/**"
      - "coder/**"
      - "Makefile"
      - "docker-compose.yaml"
      - ".github/workflows/smoke-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "extensions/**"
      - "coder/**"
      - "Makefile"
      - "docker-compose.yaml"
  schedule:
    - cron: "0 6 * * 1,4" # Monday and Thursday at 06:00 UTC
  workflow_dispatch:

jobs:
  smoke-test:
    name: Bootstrap & smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
      CLAUDE_CODE_USE_BEDROCK: "1"
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - uses: actions/checkout@v4

      - uses: systeminit/setup-swamp@v0.1.0

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: "2.7.14"

      - name: Verify extensions load
        run: |
          swamp doctor extensions --json
          TYPES=$(swamp model type search sandbox --json | jq '.results | length')
          echo "Registered $TYPES sandbox model types"
          if [ "$TYPES" -lt 4 ]; then
            echo "::error::Expected at least 4 sandbox model types, found $TYPES"
            exit 1
          fi

      - name: Store test credentials in vault
        run: make vault

      - name: Create model instances
        run: make models

      - name: Validate all models
        run: swamp model validate --json

      - name: Start Coder server
        run: make up

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Create first user and authenticate
        run: make login

      - name: Push template
        run: swamp model method run coder-template push

      - name: Verify template state
        run: |
          swamp data get coder-template current --json | jq -e '.content.buildStatus == "succeeded"'

      - name: Create workspace
        run: swamp model method run coder-workspace create

      - name: Dump build logs on failure
        if: failure()
        run: |
          echo "=== Coder server logs ==="
          docker compose logs --tail 100

      - name: Verify workspace running and agent connected
        run: |
          swamp data get coder-workspace current --json | jq -e '.content.status == "running"'
          echo "Waiting for agent to connect..."
          timeout 60 bash -c '
            until .local/bin/coder list --output json 2>/dev/null \
              | jq -e ".[0].latest_build.resources[0].agents[0].status == \"connected\"" >/dev/null 2>&1; do
              sleep 2
            done'
          echo "Agent connected"

      - name: Observe server status
        run: |
          swamp model method run coder-server status
          swamp data get coder-server current --json | jq -e '.content.status == "running"'

      - name: CEL query - all sandbox models healthy
        run: |
          RESULTS=$(swamp data query 'modelType.startsWith("sandbox/") && isLatest == true' \
            --select '{"model": modelName, "spec": specName}' --json | jq '.total')
          echo "Total sandbox data items: $RESULTS"
          if [ "$RESULTS" -lt 3 ]; then
            echo "::error::Expected at least 3 sandbox data items, found $RESULTS"
            exit 1
          fi

      - name: Verify no credential leakage in data
        run: |
          if [ -n "$AWS_BEARER_TOKEN_BEDROCK" ]; then
            TOKEN_PREFIX=$(echo "$AWS_BEARER_TOKEN_BEDROCK" | head -c 20)
            FOUND=$(grep -rl "$TOKEN_PREFIX" .swamp/data/ 2>/dev/null | wc -l)
            if [ "$FOUND" -gt 0 ]; then
              echo "::error::Plaintext credentials found in stored data!"
              exit 1
            fi
          fi

      - name: Teardown
        if: always()
        run: make destroy
