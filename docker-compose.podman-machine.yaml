# ABOUTME: Compose file for macOS podman machine where host socket paths don't resolve.
# ABOUTME: Uses the VM-internal /var/run/docker.sock instead of the macOS host path.
services:
  coder-init:
    image: ghcr.io/coder/coder:latest
    user: "0:0"
    entrypoint: ["sh", "-c", "chown -R 1000:1000 /home/coder/.config/coderv2 && chmod 666 /var/run/docker.sock"]
    volumes:
      - coder-data:/home/coder/.config/coderv2
      - /var/run/docker.sock:/var/run/docker.sock
  coder:
    image: ghcr.io/coder/coder:latest
    restart: on-failure:5
    depends_on:
      coder-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
      - "2112:2112"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - coder-data:/home/coder/.config/coderv2
    environment:
      CODER_ACCESS_URL: "http://localhost:3000"
      CODER_HTTP_ADDRESS: "0.0.0.0:3000"
      CODER_PROMETHEUS_ENABLE: "true"
      CODER_PROMETHEUS_ADDRESS: "0.0.0.0:2112"
      CODER_NOTIFICATIONS_METHOD: "${CODER_NOTIFICATIONS_METHOD:-}"
      CODER_NOTIFICATIONS_WEBHOOK_ENDPOINT: "${CODER_NOTIFICATIONS_WEBHOOK_ENDPOINT:-}"
    security_opt:
      - label=disable
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/v2/buildinfo"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

volumes:
  coder-data:
