services:
  coder:
    image: ghcr.io/coder/coder:latest
    group_add:
      - "0"
    ports:
      - "3000:3000"
    volumes:
      - ${CONTAINER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - coder-data:/home/coder/.config/coderv2
    environment:
      CODER_ACCESS_URL: "http://localhost:3000"
      CODER_HTTP_ADDRESS: "0.0.0.0:3000"

volumes:
  coder-data:
