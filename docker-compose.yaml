services:
  coder-init:
    image: ghcr.io/coder/coder:latest
    user: "0:0"
    entrypoint: ["sh", "-c", "chown -R 1000:1000 /home/coder/.config/coderv2 && chmod 666 /var/run/docker.sock"]
    volumes:
      - coder-data:/home/coder/.config/coderv2
      - ${CONTAINER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
  coder:
    image: ghcr.io/coder/coder:latest
    restart: on-failure:5
    depends_on:
      coder-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - ${CONTAINER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - coder-data:/home/coder/.config/coderv2
    environment:
      CODER_ACCESS_URL: "http://localhost:3000"
      CODER_HTTP_ADDRESS: "0.0.0.0:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/v2/buildinfo"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

volumes:
  coder-data:
