type: command/shell
typeVersion: 2026.02.09.1
id: 0945cef0-e6a9-4a23-8d42-5fd8501ba486
name: sandbox-filesystem
version: 1
tags:
  example: "04-workflow-dag"
globalArguments: {}
methods:
  execute:
    arguments:
      run: |
        echo "{"
        echo "  \"observedAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\","
        echo "  \"diskUsage\": {"
        echo "    \"rootPercent\": \"$(df / 2>/dev/null | tail -1 | awk '{print $5}')\","
        echo "    \"rootAvailMB\": $(df -m / 2>/dev/null | tail -1 | awk '{print $4}')"
        echo "  },"
        echo "  \"homeDirFiles\": $(find /home/coder -maxdepth 2 -type f 2>/dev/null | wc -l),"
        echo "  \"tmpFiles\": $(find /tmp -type f 2>/dev/null | wc -l),"
        echo "  \"largeFiles\": [$(find / -maxdepth 3 -type f -size +10M 2>/dev/null | head -5 | awk '{print "\"" $1 "\""}' | tr '\n' ',' | sed 's/,$//')],"
        echo "  \"writableDirs\": [$(find / -maxdepth 2 -writable -type d 2>/dev/null | head -10 | awk '{print "\"" $1 "\""}' | tr '\n' ',' | sed 's/,$//')]"
        echo "}"
