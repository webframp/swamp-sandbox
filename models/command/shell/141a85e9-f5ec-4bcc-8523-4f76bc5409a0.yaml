type: command/shell
typeVersion: 2026.02.09.1
id: 141a85e9-f5ec-4bcc-8523-4f76bc5409a0
name: sandbox-assess
version: 1
tags:
  example: "04-workflow-dag"
globalArguments: {}
methods:
  execute:
    arguments:
      run: |
        echo "{"
        echo "  \"assessedAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\","
        echo "  \"summary\": {"
        echo "    \"filesystemHealthy\": $(df / 2>/dev/null | tail -1 | awk '{gsub(/%/,"",$5); print ($5 < 90) ? "true" : "false"}'),"
        echo "    \"processCount\": $(ps aux 2>/dev/null | tail -n +2 | wc -l),"
        echo "    \"listeningPorts\": $(ss -tlnp 2>/dev/null | tail -n +2 | wc -l),"
        echo "    \"networkReachable\": $(nslookup swamp.club 2>/dev/null | grep -q 'Address' && echo true || echo false)"
        echo "  },"
        echo "  \"verdict\": \"$(if df / 2>/dev/null | tail -1 | awk '{gsub(/%/,"",$5); exit ($5 >= 90)}' && nslookup swamp.club 2>/dev/null | grep -q 'Address'; then echo 'healthy'; else echo 'degraded'; fi)\""
        echo "}"
